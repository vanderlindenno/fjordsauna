<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Killand Badstue</title>

<!-- Swiper CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

<style>
:root{
  --primary:#2b5d6e;
  --bg:#f5f7fa;
  --card:#ffffff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:#333;
}

header{
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:2rem 1rem;
}

main{
  max-width:820px;
  margin:auto;
  padding:1rem;
}

.card{
  background:var(--card);
  border-radius:8px;
  padding:1.4rem;
  margin-bottom:1rem;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

h2{
  margin-top:0;
  color:var(--primary);
}

/* ================= NORMAL SWIPER ================= */
.thumbnail-swiper{
  height:260px;
  border-radius:8px;
  overflow:hidden;
}

.thumbnail-swiper img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.thumbnail-swiper .swiper-pagination-bullet-active{
  background:#fff;
}

/* ================= FULLSCREEN OVERLAY ================= */
.fullscreen-overlay{
  position:fixed;
  inset:0;
  background:#000;
  z-index:10000;
  display:none;
}

.fullscreen-overlay.active{
  display:block;
}

.fullscreen-swiper{
  height:100vh;
}

.fullscreen-swiper img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* Close button */
.fs-close{
  position:absolute;
  top:16px;
  right:16px;
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:1rem;
  color:#777;
}
</style>
</head>

<body>

<header>
  <h1>Killand Badstue</h1>
  <p>Lei badstue – en varm opplevelse året rundt</p>
</header>

<main>

  <div class="card">
    <h2>Om badstuen</h2>
    <p>Koselig og avslappende badstue, perfekt for restitusjon og velvære.</p>
  </div>

  <div class="card">
    <h2>Bilder</h2>

    <!-- NORMALE FOTO’S IN DE PAGINA -->
    <div class="swiper thumbnail-swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <img src="01.jpg" alt="Badstue 1">
        </div>
        <div class="swiper-slide">
          <img src="02.jpg" alt="Badstue 2">
        </div>
        <div class="swiper-slide">
          <img src="03.jpg" alt="Badstue 3">
        </div>
      </div>
      <div class="swiper-pagination"></div>
    </div>

  </div>

  <div class="card">
    <h2>Priser</h2>
    <p><strong>500 kr per time</strong> – uavhengig av antall personer</p>
  </div>

</main>

<footer>
  © 2026 Killand Badstue
</footer>

<!-- ================= FULLSCREEN GALLERY (ISOLERT) ================= -->
<div id="fullscreenGallery" class="fullscreen-overlay">
  <div class="swiper fullscreen-swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="01.jpg"></div>
      <div class="swiper-slide"><img src="02.jpg"></div>
      <div class="swiper-slide"><img src="03.jpg"></div>
    </div>
  </div>
  <button class="fs-close">✕</button>
</div>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
/* Normale swiper in de pagina */
const thumbs = new Swiper('.thumbnail-swiper', {
  pagination:{
    el:'.swiper-pagination',
    clickable:true
  }
});

/* Fullscreen swiper */
const fullscreenSwiper = new Swiper('.fullscreen-swiper', {
  loop:true
});

const overlay = document.getElementById('fullscreenGallery');
const closeBtn = document.querySelector('.fs-close');

/* Open fullscreen alleen op mobiel */
document.querySelector('.thumbnail-swiper').addEventListener('click', () => {
  if(window.innerWidth > 768) return;
  overlay.classList.add('active');
});

/* Sluiten */
closeBtn.addEventListener('click', () => {
  overlay.classList.remove('active');
});
</script>

</body>
</html>
``
