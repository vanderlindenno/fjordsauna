<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vegårstue – Bilder</title>

<style>
body{
  margin:0;
  font-family:system-ui,Arial,sans-serif;
  background:#f5f7fa;
}

main{
  max-width:900px;
  margin:auto;
  padding:1rem;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:1.5rem;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* Gallery */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.gallery img{
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

/* Lightbox */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.lightbox.open{display:flex}

.lightbox img{
  max-width:92%;
  max-height:90%;
  border-radius:10px;
}

.lb-close,.lb-prev,.lb-next{
  position:absolute;
  color:#fff;
  font-size:2.5rem;
  cursor:pointer;
  user-select:none;
}

.lb-close{top:15px;right:20px}
.lb-prev{left:20px}
.lb-next{right:20px}
</style>
</head>

<body>

<main>
  <div class="card">
    <h2>Bilder</h2>

    <div class="gallery">
      <img src="01.jpg" loading="lazy" data-index="0" alt="Badstue">
      <img src="02.jpg" loading="lazy" data-index="1" alt="Badstue">
      <img src="03.jpg" loading="lazy" data-index="2" alt="Badstue">
      <img src="04.jpg" loading="lazy" data-index="3" alt="Badstue">
      <img src="05.jpg" loading="lazy" data-index="4" alt="Badstue">
      <img src="06.jpg" loading="lazy" data-index="5" alt="Badstue">
    </div>
  </div>

  <!-- VOORBEELD: REST VAN PAGINA -->
  <div class="card" style="margin-top:1rem">
    <h2>Over de badstue</h2>
    <p>Deze content blijft nu gewoon zichtbaar ✅</p>
  </div>

</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lb-close" id="close">✕</span>
  <span class="lb-prev" id="prev">❮</span>
  <img id="lightImg">
  <span class="lb-next" id="next">❯</span>
</div>

<script>
const images=[...document.querySelectorAll('.gallery img')];
const lightbox=document.getElementById('lightbox');
const lightImg=document.getElementById('lightImg');
let index=0;

// open
images.forEach(img=>{
  img.onclick=()=>{
    index=+img.dataset.index;
    show();
    lightbox.classList.add('open');
  }
});

function show(){
  lightImg.src=images[index].src;
}

// close
document.getElementById('close').onclick=()=>lightbox.classList.remove('open');
lightbox.onclick=e=>{if(e.target===lightbox)lightbox.classList.remove('open')};

// nav
document.getElementById('next').onclick=()=>{index=(index+1)%images.length;show();}
document.getElementById('prev').onclick=()=>{index=(index-1+images.length)%images.length;show();}

// swipe
let startX=0;
lightbox.addEventListener('touchstart',e=>startX=e.touches[0].clientX,{passive:true});
lightbox.addEventListener('touchend',e=>{
  let diff=e.changedTouches[0].clientX-startX;
  if(Math.abs(diff)>50){
    diff<0?document.getElementById('next').click():
            document.getElementById('prev').click();
  }
});
</script>

</body>
</html>
``
