<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Killand Badstue</title>

<!-- Swiper CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@swiper/swiper-b
  --primary:#2b5d6e;
  --bg:#f5f7fa;
  --card:#ffffff;
}

*{ box-sizing:border-box }

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:#333;
}

header{
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:2rem 1rem;
}

main{
  max-width:820px;
  margin:auto;
  padding:1rem;
}

.card{
  background:var(--card);
  border-radius:8px;
  padding:1.4rem;
  margin-bottom:1rem;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

h2{
  margin-top:0;
  color:var(--primary);
}

/* ===== SWIPER ===== */
.swiper{
  width:100%;
  height:260px;
  border-radius:8px;
}

.swiper-slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.swiper-pagination-bullet-active{
  background:#fff;
}

.swiper-button-next,
.swiper-button-prev{
  color:#fff;
}

/* ===== FULLSCREEN (MOBIL) ===== */
.swiper.fullscreen{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  z-index:9999;
  background:#000;
  border-radius:0;
}

.swiper.fullscreen .swiper-slide img{
  object-fit:contain;
}

/* Skjul piler på mobil */
@media(max-width:768px){
  .swiper-button-next,
  .swiper-button-prev{
    display:none;
  }
}

/* Lukkeknapp */
.fullscreen-close{
  position:fixed;
  top:16px;
  right:16px;
  width:44px;
  height:44px;
  border-radius:50%;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10000;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>Killand Badstue</h1>
  <p>Lei badstue – en varm opplevelse året rundt</p>
</header>

<main>

  <div class="card">
    <h2>Om badstuen</h2>
    <p>Koselig og avslappende badstue, perfekt for restitusjon og velvære.</p>
  </div>

  <div class="card">
    <h2>Bilder</h2>

    <div class="swiper saunaSwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <img src="01.jpg" alt="Badstue 1iv class="swiper-slide">
          <img src="02.jpg" alt="Bad    <div class="swiper-slide">
          <img src="03.jpg"div>
      </div>

      <div class="swiper-pagination"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>
  </div>

  <div class="card">
    <h2>Priser</h2>
    <p><strong>500 kr per time</strong> – uavhengig av antall personer</p>
  </div>

</main>

<footer style="text-align:center;padding:1rem;color:#777">
  © 2026 Killand Badstue
</footer>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/@swiper/swiper-bundle.min
const swiper = new Swiper('.saunaSwiper', {
  loop:true,
  autoplay:{
    delay:4000,
    disableOnInteraction:false
  },
  pagination:{
    el:'.swiper-pagination',
    clickable:true
  },
  navigation:{
    nextEl:'.swiper-button-next',
    prevEl:'.swiper-button-prev'
  }
});

const swiperEl = document.querySelector('.saunaSwiper');
let closeBtn = null;

function openFullscreen(){
  if(window.innerWidth > 768) return;

  swiper.autoplay.stop();
  swiperEl.classList.add('fullscreen');

  closeBtn = document.createElement('div');
  closeBtn.className = 'fullscreen-close';
  closeBtn.innerHTML = '✕';
  document.body.appendChild(closeBtn);

  closeBtn.addEventListener('click', closeFullscreen);
}

function closeFullscreen(){
  swiperEl.classList.remove('fullscreen');
  swiper.autoplay.start();
  if(closeBtn){
    closeBtn.remove();
    closeBtn = null;
  }
}

swiperEl.addEventListener('click', openFullscreen);
</script>

</body>
</html>
