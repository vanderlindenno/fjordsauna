<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vegårstue – Badstua mellom fjell og fjord</title>

<style>
:root{
  --primary:#2b5d6e;
  --bg:#f5f7fa;
  --card:#ffffff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:#333;
}

header{
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:2.5rem 1rem;
}

main{
  max-width:820px;
  margin:auto;
  padding:1rem;
}

.card{
  background:var(--card);
  border-radius:12px;
  padding:1.5rem;
  margin-bottom:1rem;
  box-shadow:0 4px 14px rgba(0,0,0,.05);
}

h2{
  margin-top:0;
  color:var(--primary);
}

.status{
  font-size:1.1rem;
  font-weight:600;
  margin-bottom:.3rem;
}

.meta{
  margin-top:.4rem;
  font-size:.9rem;
  color:#555;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
@media (max-width:600px){
  .gallery{grid-template-columns:repeat(2,1fr);}
}
.gallery img{
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  background:#e5e7eb;
}

/* MAP */
iframe{
  width:100%;
  height:320px;
  border:0;
  border-radius:10px;
}

/* MOBILE */
.mobile{display:none}
.desktop{display:inline}
@media (max-width:768px){
  .mobile{display:inline}
  .desktop{display:none}
}

/* CHAT BUTTONS */
.chat-buttons{
  position:fixed;
  bottom:20px;
  right:15px;
  display:none;
  flex-direction:column;
  gap:12px;
  z-index:1000;
}
@media (max-width:768px){
  .chat-buttons{display:flex;}
}

.chat-btn{
  width:56px;
  height:56px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
  overflow:hidden;
  background:#0b5ed7;
}
.chat-btn img{
  width:56px;
  height:56px;
  object-fit:contain;
  display:block;
}

/* FAQ */
.faq-item{
  border-bottom:1px solid #e5e7eb;
  padding:.8rem 0;
}
.faq-question{
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  font-weight:600;
}
.faq-question span{
  font-size:1.4rem;
  transition:transform .2s ease;
}
.faq-answer{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease;
  color:#555;
  font-size:.95rem;
  margin-top:.4rem;
}
.faq-item.open .faq-answer{max-height:500px}
.faq-item.open .faq-question span{transform:rotate(45deg)}

footer{
  text-align:center;
  padding:1rem;
  color:#777;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.lightbox.open{display:flex}
.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}
.lb-close,.lb-prev,.lb-next{
  position:absolute;
  color:#fff;
  font-size:2.4rem;
  cursor:pointer;
  user-select:none;
}
.lb-close{top:16px;right:20px}
.lb-prev{left:20px;top:50%;transform:translateY(-50%)}
.lb-next{right:20px;top:50%;transform:translateY(-50%)}
</style>
</head>

<body>

<header>
  <h1>Vegårstue – Badstua mellom fjell og fjord</h1>
  <p>Lei badstue – en varm opplevelse året rundt</p>
</header>

<main>

<div class="card">
  <h2>Om badstuen 🧖</h2>
  <p>Vi tilbyr utleie av en koselig og stemningsfull, vedfyrt privat badstue.</p>
</div>

<div class="card">
  <h2>🌡️ Badstueklima</h2>
  <div id="status" class="status">Henter sanntidsdata…</div>
  <div id="updated" class="meta"></div>
</div>

<div class="card">
  <h2>Bilder 🖼️</h2>
  <div class="gallery">
    <img src="01.jpg" alt="">
    <img src="02.jpg" alt="">
    <img src="03.jpg" alt="">
    <img src="04.jpg" alt="">
    <img src="05.jpg" alt="">
    <img src="06.jpg" alt="">
  </div>
</div>

</main>

<footer>© 2026 Vegårstue</footer>

<div class="chat-buttons">
  <a class="chat-btn" href="https://wa.me/4794505716"><img src="wa.png"></a>
  <a class="chat-btn" href="sms:+4794505716"><img src="sms.png"></a>
  <a class="chat-btn" href="tel:+4794505716"><img src="phone.png"></a>
</div>

<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lbClose">✕</span>
  <span class="lb-prev" id="lbPrev">❮</span>
  <img id="lbImage">
  <span class="lb-next" id="lbNext">❯</span>
</div>

<script>
document.querySelectorAll('.faq-question').forEach(q=>{
  q.onclick=()=>q.parentElement.classList.toggle('open');
});

const READY_TEMP=70, WARM_TEMP=40, MAX_AGE_MIN=15;
const TEXT_COLD="Badstuen er kald";
const TEXT_WARM="Badstuen varmes opp";
const TEXT_READY="Badstuen er klar";

function updateSauna(){
 fetch(`badstua.json?ts=${Date.now()}`)
  .then(r=>r.json())
  .then(d=>{
    const t=d.temperature;
    const h=d.humidity;
    const u=new Date(d.updated);
    let text=t>=READY_TEMP?TEXT_READY:t>=WARM_TEMP?TEXT_WARM:TEXT_COLD;
    let icon=t<WARM_TEMP?"❄️":"🌡️";
    status.innerHTML=`<strong>${text}</strong><br>${icon} ${t} °C – 💧 ${h}%`;
    updated.innerText=`Sist oppdatert: ${u.toLocaleString('no-NO')}`;
  });
}

document.addEventListener('DOMContentLoaded',()=>{
  updateSauna();
  setInterval(updateSauna,300000);

  const imgs=[...document.querySelectorAll('.gallery img')];
  const lb=lightbox, lbImg=lbImage;
  let i=0;

  function show(n){i=(n+imgs.length)%imgs.length;lbImg.src=imgs[i].src;}
  imgs.forEach((img,idx)=>img.onclick=()=>{show(idx);lb.classList.add('open');});
  lbClose.onclick=()=>lb.classList.remove('open');
  lbPrev.onclick=()=>show(i-1);
  lbNext.onclick=()=>show(i+1);
});
</script>

</body>
</html>
``
