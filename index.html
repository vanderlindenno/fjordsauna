<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Killand Badstue</title>

<style>
:root {
  --primary:#2b5d6e;
  --bg:#f5f7fa;
  --card:#ffffff;
  --accent:#d35400;
}

* { box-sizing:border-box }

body {
  margin:0;
  font-family:system-ui, Arial, sans-serif;
  background:var(--bg);
  color:#333;
}

header {
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:2.5rem 1rem;
}

main {
  max-width:860px;
  margin:auto;
  padding:1.2rem;
}

.card {
  background:var(--card);
  border-radius:14px;
  padding:1.6rem;
  margin-bottom:1.4rem;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

h2 {
  color:var(--primary);
  margin-top:0;
}

.badstua-status {
  font-size:1.25rem;
  font-weight:600;
  margin-bottom:.4rem;
}

.badstua-meta {
  font-size:.9rem;
  color:#666;
}

footer {
  text-align:center;
  padding:1.2rem;
  background:#e1e5ea;
  font-size:.85rem;
}

.chat-buttons {
  position:fixed;
  bottom:20px;
  right:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.chat-btn {
  width:54px;
  height:54px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
  color:#fff;
  font-size:22px;
  text-decoration:none;
}

.whatsapp { background:#25D366 }
.sms { background:#6c7580 }
</style>
</head>

<body>

<header>
  <h1>Killand Badstue</h1>
  <p>Lei badstue – en varm opplevelse året rundt</p>
</header>

<main>

  <!-- OM BADSTUEN -->
  <div class="card">
    <h2>Om badstuen</h2>
    <p>
      En koselig og romslig badstue – perfekt for avslapning,
      restitusjon og sosial hygge året rundt.
    </p>
  </div>

  <!-- BADSTUEKLIMA -->
  <div class="card">
    <h2>🌡️ Badstueklima</h2>
    <div id="badstua-status" class="badstua-status">
      Henter sanntidsdata…
    </div>
    <div id="badstua-updated" class="badstua-meta"></div>
    <div id="badstua-countdown" class="badstua-meta"></div>
  </div>

  <!-- PRIS -->
  <div class="card">
    <h2>Priser</h2>
    <p><strong>500 kr per time</strong> – uavhengig av antall personer</p>
  </div>

</main>

<footer>
  © 2026 Killand Badstue
</footer>

<div class="chat-buttons">
  <a class="chat-btn whatsapp" href="https://wa.me/4794505716">💬</a>
  <a class="chat-btn sms" href="sms:+4794505716">✉️</a>
</div>

<script>
const REFRESH_MINUTES = 5;
let countdownTimer;

function formatTime(date) {
  return date.toLocaleString('no-NO');
}

function startCountdown(nextUpdate) {
  clearInterval(countdownTimer);

  function tick() {
    const now = new Date();
    const diff = nextUpdate - now;

    if (diff <= 0) {
      document.getElementById('badstua-countdown').innerText =
        '🔄 Oppdaterer…';
      return;
    }

    const total = Math.floor(diff / 1000);
    const min = String(Math.floor(total / 60)).padStart(2, '0');
    const sec = String(total % 60).padStart(2, '0');

    document.getElementById('badstua-countdown').innerText =
      `⏳ Neste oppdatering om: ${min}:${sec}`;
  }

  tick();
  countdownTimer = setInterval(tick, 1000);
}

function oppdaterBadstua() {
  fetch('badstua.json')
    .then(r => r.json())
    .then(d => {
      const temp = d.temperature.toFixed(1).replace('.', ',');
      const hum = d.humidity;

      const updated = new Date(d.updated);
      const nextUpdate = new Date(
        updated.getTime() + REFRESH_MINUTES * 60 * 1000
      );

      document.getElementById('badstua-status').innerHTML =
        `🔥 I badstuen er det nå 
         <span style="color:var(--accent)">${temp} °C</span>
         med <span style="color:var(--accent)">${hum} %</span> luftfuktighet.`;

      document.getElementById('badstua-updated').innerText =
        `📅 Sist oppdatert: ${formatTime(updated)}`;

      startCountdown(nextUpdate);
    })
    .catch(() => {
      document.getElementById('badstua-status').innerText =
        '⚠️ Kunne ikke hente badstuedata.';
    });
}

oppdaterBadstua();
setInterval(oppdaterBadstua, REFRESH_MINUTES * 60 * 1000);
</script>

</body>
</html>
