<script>
const REFRESH_MINUTES = 5;
const READY_TEMP = 70;
const WARM_TEMP = 40;
const MAX_DATA_AGE_MIN = 15;

function oppdaterBadstua(){
  fetch(`badstua.json?ts=${Date.now()}`)
    .then(r => r.json())
    .then(d => {
      const tempNum = d.temperature;
      const hum = d.humidity;
      const updated = new Date(d.updated);

      const temp = tempNum.toFixed(1).replace('.', ',');
      const ageMinutes = (Date.now() - updated.getTime()) / 60000;

      let statusText = '';
      let statusColor = 'var(--temp-cold)';
      let readyText = '';

      if (tempNum >= READY_TEMP) {
        statusText = '✅ Badstuen er klar 🔥';
        statusColor = 'var(--temp-hot)';
        readyText = 'Klar til bruk';
      } 
      else if (tempNum >= WARM_TEMP) {
        statusText = '🟡 Oppvarming pågår';
        statusColor = 'var(--temp-warm)';
        readyText = 'Varmes opp';
      } 
      else {
        statusText = '❄️ Badstuen er kald';
        statusColor = 'var(--temp-cold)';
        readyText = 'Ikke klar';
      }

      document.getElementById('badstua-status').innerHTML =
        `${statusText}<br>
        <span style="color:${statusColor}">${temp} °C</span> – 
        <span style="color:var(--humidity)">${hum} %</span> luftfuktighet`;

      document.getElementById('badstua-updated').innerText =
        `Sist oppdatert: ${updated.toLocaleString('no-NO')}`;

      document.getElementById('badstua-ready').innerText =
        tempNum >= READY_TEMP ? '✅ Klar til bruk' :
        tempNum >= WARM_TEMP ? '🟡 Oppvarming pågår' :
        '';

      if (ageMinutes > MAX_DATA_AGE_MIN) {
        document.getElementById('badstua-status').innerText =
          '⚠️ Data er eldre enn 15 minutter';
        document.getElementById('badstua-ready').innerText = '';
      }
    })
    .catch(() => {
      document.getElementById('badstua-status').innerText =
        '⚠️ Kunne ikke hente badstuedata.';
      document.getElementById('badstua-updated').innerText = '';
      document.getElementById('badstua-ready').innerText = '';
    });
}

oppdaterBadstua();
setInterval(oppdaterBadstua, REFRESH_MINUTES * 60000);
</script>
