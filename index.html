<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Killand Badstue</title>

<style>
:root{
  --primary:#2b5d6e;
  --bg:#f5f7fa;
  --card:#ffffff;
  --cold:#3498db;
  --warm:#e67e22;
  --hot:#c0392b;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:#333;
}

header{
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:2.4rem 1rem;
}

main{
  max-width:820px;
  margin:auto;
  padding:1rem;
}

.card{
  background:var(--card);
  border-radius:10px;
  padding:1.4rem;
  margin-bottom:1.2rem;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

h2{
  color:var(--primary);
  margin-top:0;
}

/* BADSTUEKLIMA */
.badstua-card{
  border-left:6px solid var(--warm);
}

.badstua-status{
  font-size:1.25rem;
  font-weight:700;
  margin-bottom:.4rem;
}

.badstua-meta{
  font-size:.9rem;
  color:#666;
  margin-bottom:.3rem;
}

.badstua-countdown{
  background:#f0f3f6;
  border-radius:6px;
  padding:.5rem .7rem;
  font-weight:600;
  font-size:.9rem;
  display:inline-block;
}

.badstua-ready{
  margin-top:.5rem;
  font-weight:700;
  color:var(--hot);
}

footer{
  text-align:center;
  padding:1rem;
  background:#e1e5ea;
  font-size:.85rem;
}
</style>
</head>

<body>

<header>
  <h1>Killand Badstue</h1>
  <p>Lei badstue – en varm opplevelse året rundt</p>
</header>

<main>

  <!-- OM BADSTUEN -->
  <div class="card">
    <h2>Om badstuen</h2>
    <p>
      En koselig og avslappende badstue, perfekt for restitusjon,
      velvære og sosial hygge året rundt.
    </p>
  </div>

  <!-- BADSTUEKLIMA -->
  <div class="card badstua-card">
    <h2>🌡️ Badstueklima</h2>

    <div id="badstua-status" class="badstua-status">
      Henter sanntidsdata…
    </div>

    <div id="badstua-ready" class="badstua-ready"></div>

    <div id="badstua-updated" class="badstua-meta"></div>
    <div id="badstua-countdown" class="badstua-countdown"></div>
  </div>

  <div class="card">
    <h2>Priser</h2>
    <p><strong>500 kr per time</strong> – uavhengig av antall personer</p>
  </div>

</main>

<footer>
  © 2026 Killand Badstue
</footer>

<script>
const REFRESH_MINUTES = 5;
let countdownInterval = null;
let nextUpdateTime = null;

function formatNO(date){
  return date.toLocaleString('no-NO');
}

function temperaturFarge(temp){
  if (temp >= 70) return 'var(--hot)';
  if (temp >= 40) return 'var(--warm)';
  return 'var(--cold)';
}

function startCountdown(){
  if (countdownInterval) clearInterval(countdownInterval);

  countdownInterval = setInterval(() => {
    const now = new Date();
    const diff = nextUpdateTime - now;

    if (diff <= 0){
      document.getElementById('badstua-countdown').innerText =
        '🔄 Oppdaterer…';
      return;
    }

    const total = Math.floor(diff / 1000);
    const min = String(Math.floor(total / 60)).padStart(2,'0');
    const sec = String(total % 60).padStart(2,'0');

    document.getElementById('badstua-countdown').innerText =
      `⏳ Neste oppdatering om ${min}:${sec}`;
  }, 1000);
}

function oppdaterBadstua(){
  fetch('badstua.json')
    .then(r => r.json())
    .then(d => {
      const tempNum = d.temperature;
      const temp = tempNum.toFixed(1).replace('.', ',');
      const hum = d.humidity;

      const updated = new Date(d.updated);
      nextUpdateTime = new Date(
        updated.getTime() + REFRESH_MINUTES * 60000
      );

      const color = temperaturFarge(tempNum);
      document.querySelector('.badstua-card').style.borderLeftColor = color;

      document.getElementById('badstua-status').innerHTML =
        `🔥 I badstuen er det nå 
         <span style="color:${color}">${temp} °C</span>
         med <strong>${hum} %</strong> luftfuktighet.`;

      document.getElementById('badstua-updated').innerText =
        `📅 Sist oppdatert: ${formatNO(updated)}`;

      if (tempNum >= 70){
        document.getElementById('badstua-ready').innerText =
          '✅ Badstuen er klar 🔥';
      } else {
        document.getElementById('badstua-ready').innerText = '';
      }

      startCountdown();
    })
    .catch(() => {
      document.getElementById('badstua-status').innerText =
        '⚠️ Kunne ikke hente badstuedata.';
      document.getElementById('badstua-ready').innerText = '';
      document.getElementById('badstua-updated').innerText = '';
      document.getElementById('badstua-countdown').innerText = '';
      if (countdownInterval) clearInterval(countdownInterval);
    });
}

// første last
oppdaterBadstua();

// ny henting hver 5. minutt
setInterval(oppdaterBadstua, REFRESH_MINUTES * 60000);
</script>

</body>
</html>
``
