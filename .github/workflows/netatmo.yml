name: Update temperatuur 2

on:
  schedule:
    - cron: "*/10 * * * *"   # elke 10 minuten
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Haal Netatmo temperatuur op
        env:
          CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.NETATMO_REFRESH_TOKEN }}
        run: |
          echo "== Stap 1: Access token ophalen =="

          TOKEN_RESPONSE=$(curl -s https://api.netatmo.com/oauth2/token \
            -d grant_type=refresh_token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN")

          echo "Token response:"
          echo "$TOKEN_RESPONSE"

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Geen access token ontvangen, stoppen."
            exit 0
          fi

          echo "== Stap 2: Station data ophalen =="

          STATION_RESPONSE=$(curl -s https://api.netatmo.com/api/getstationsdata \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          echo "Station response:"
          echo "$STATION_RESPONSE"

          TEMPERATURE=$(echo "$STATION_RESPONSE" | jq -r '.body.devices[0].dashboard_data.Temperature // empty')

          if [ -z "$TEMPERATURE" ]; then
            echo "❌ Temperatuur niet gevonden, stoppen."
            exit 0
          fi

          echo "✅ Gevonden temperatuur: $TEMPERATURE °C"
          echo "$TEMPERATURE" > temperatuur.txt

      - name: Commit en push temperatuur
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add temperatuur.txt
          git commit -m "Update temperatuur" || echo "Geen wijziging om te committen"
          git push
``
