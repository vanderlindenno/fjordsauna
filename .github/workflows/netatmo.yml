name: Update temperatuur

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Haal Netatmo temperatuur op
        env:
          CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.NETATMO_REFRESH_TOKEN }}
        run: |
          echo "🔐 Access token ophalen…"

          RAW_TOKEN=$(curl -s https://api.netatmo.com/oauth2/token \
            -d grant_type=refresh_token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN")

          echo "Token response:"
          echo "$RAW_TOKEN"

          TOKEN=$(echo "$RAW_TOKEN" | jq -r '.access_token // empty')

          if [ -z "$TOKEN" ]; then
            echo "❌ Geen access_token ontvangen – stoppen zonder crash."
            exit 0
          fi

          echo "🌡️ Station data ophalen…"

          RAW_STATION=$(curl -s https://api.netatmo.com/api/getstationsdata \
            -H "Authorization: Bearer $TOKEN")

          echo "Station response:"
          echo "$RAW_STATION"

          TEMP=$(echo "$RAW_STATION" | jq -r '.body.devices[0].dashboard_data.Temperature // empty')

          if [ -z "$TEMP" ]; then
            echo "❌ Geen temperatuur gevonden – stoppen zonder crash."
            exit 0
          fi

          echo "✅ Temperatuur: $TEMP °C"
          echo "$TEMP" > temperatuur.txt

      - name: Commit en push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
