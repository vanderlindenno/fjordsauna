name: Netatmo temperatuur

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"   # elke 10 minuten

jobs:
  netatmo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Haal Netatmo temperatuur op
        env:
          CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.NETATMO_REFRESH_TOKEN }}
        run: |
          TOKEN_RESPONSE=$(curl -s https://api.netatmo.com/oauth2/token \
            -d grant_type=refresh_token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$ACCESS_TOKEN" ]; then exit 1; fi

          STATION_RESPONSE=$(curl -s https://api.netatmo.com/api/getstationsdata \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          TEMPERATURE=$(echo "$STATION_RESPONSE" | jq -r '.body.devices[0].dashboard_data.Temperature // empty')
          if [ -z "$TEMPERATURE" ]; then exit 1; fi

          echo "$TEMPERATURE" > temperatuur.txt

      - name: Commit en push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add temperatuur.txt
          git commit -m "Update temperatuur" || echo "Geen wijziging"
          git push
``
