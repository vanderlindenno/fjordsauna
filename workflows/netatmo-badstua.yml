name: Netatmo Badstua

on:
  workflow_dispatch:

jobs:
  badstua:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Haal Badstua temperatuur en luchtvochtigheid op
        env:
          CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.NETATMO_REFRESH_TOKEN }}
        run: |
          TOKEN=$(curl -s https://api.netatmo.com/oauth2/token -d grant_type=refresh_token -d client_id="$CLIENT_ID" -d client_secret="$CLIENT_SECRET" -d refresh_token="$REFRESH_TOKEN" | jq -r ".access_token")

          DATA=$(curl -s https://api.netatmo.com/api/getstationsdata -H "Authorization: Bearer $TOKEN")

          TEMP=$(echo "$DATA" | jq -r ".body.devices[].modules[] | select(.module_name==\"Badstua\") | .dashboard_data.Temperature")
          HUM=$(echo "$DATA" | jq -r ".body.devices[].modules[] | select(.module_name==\"Badstua\") | .dashboard_data.Humidity")

          echo "{ \"temperature\": $TEMP, \"humidity\": $HUM }" > badstua.json

      - name: Commit en push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add badstua.json
          git pull --rebase origin main
          git commit -m "Update Badstua data" || echo "Geen wijziging"
          git push

